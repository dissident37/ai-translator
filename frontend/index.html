<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Übersetzer · DE ↔ RU</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=IBM+Plex+Mono:wght@300;400&family=IBM+Plex+Sans:wght@300;400;500&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --ink: #1a1208;
            --paper: #f5f0e8;
            --cream: #ede8dc;
            --rust: #b84a1e;
            --gold: #c8962a;
            --muted: #7a7060;
            --border: #c8bfaa;
            --left-highlight: #fac775;
            --right-highlight: #c0dd97;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: var(--paper);
            color: var(--ink);
            font-family: 'IBM Plex Sans', sans-serif;
            font-weight: 300;
            background-image:
                radial-gradient(ellipse at 10% 20%, rgba(200, 150, 42, 0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 90% 80%, rgba(184, 74, 30, 0.05) 0%, transparent 50%);
        }

        *:focus-visible {
            outline: 1px solid var(--gold);
            outline-offset: 2px;
        }

        header {
            padding: 2rem 3rem 1.2rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: baseline;
            gap: 1.5rem;
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: -0.02em;
        }

        .logo span {
            color: var(--rust);
            font-style: italic;
        }

        .subtitle {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.68rem;
            color: var(--muted);
            letter-spacing: 0.14em;
            text-transform: uppercase;
        }

        .main {
            max-width: 1180px;
            margin: 0 auto;
            padding: 2rem 2rem 3rem;
        }

        .workspace {
            border: 1px solid var(--border);
            background: rgba(255, 255, 255, 0.52);
            backdrop-filter: blur(6px);
        }

        .top-bar,
        .bottom-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            padding: 0.95rem 1.2rem;
            border-bottom: 1px solid var(--border);
        }

        .bottom-bar {
            border-top: 1px solid var(--border);
            border-bottom: none;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.68rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--muted);
        }

        .badge {
            min-width: 58px;
            text-align: center;
            padding: 0.4rem 0.85rem;
            border: 1px solid var(--border);
            background: var(--cream);
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.74rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--ink);
        }

        .swap-btn,
        .icon-btn {
            width: 30px;
            height: 30px;
            border: 0.5px solid var(--border);
            background: transparent;
            color: var(--muted);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: border-color 0.18s, color 0.18s, background 0.18s;
            flex-shrink: 0;
        }

        .swap-btn:hover,
        .icon-btn:hover {
            color: var(--ink);
            border-color: var(--ink);
        }

        .swap-btn svg,
        .icon-btn svg {
            width: 16px;
            height: 16px;
            stroke: currentColor;
            fill: none;
            stroke-width: 1.8;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .icon-btn.recording {
            color: #fff;
            background: #b42318;
            border-color: #b42318;
        }

        .panels {
            display: grid;
            grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
            min-height: 62vh;
        }

        .panel {
            min-width: 0;
            display: flex;
            flex-direction: column;
        }

        .panel + .panel {
            border-left: 1px solid var(--border);
        }

        .panel-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            padding: 1rem 1.2rem 0.85rem;
            border-bottom: 1px solid rgba(200, 191, 170, 0.6);
        }

        .panel-title {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.66rem;
            letter-spacing: 0.16em;
            text-transform: uppercase;
            color: var(--muted);
        }

        .panel-tools {
            display: flex;
            align-items: center;
            gap: 0.45rem;
        }

        .panel-scroll {
            flex: 1;
            min-height: 0;
            overflow-y: auto;
            padding: 1.25rem 1.2rem 1.5rem;
            scrollbar-gutter: stable;
        }

        .editor {
            min-height: 100%;
            white-space: pre-wrap;
            word-break: break-word;
            line-height: 1.75;
            font-size: 1rem;
            color: var(--ink);
        }

        .editor:empty::before {
            content: attr(data-placeholder);
            color: var(--muted);
        }

        .editor:focus {
            outline: none;
        }

        .translation-output {
            min-height: 100%;
            white-space: pre-wrap;
            word-break: break-word;
            line-height: 1.75;
            font-size: 1rem;
            color: var(--ink);
        }

        .translation-output.empty {
            color: var(--muted);
            font-style: italic;
        }

        .sentence {
            display: inline;
            border-radius: 2px;
            padding: 0.02rem 0.06rem;
            cursor: pointer;
            transition: background 0.16s ease;
        }

        .sentence + .sentence {
            margin-left: 0.12rem;
        }

        .sentence.left.active {
            background: var(--left-highlight);
        }

        .sentence.right.active {
            background: var(--right-highlight);
        }

        .skeleton {
            display: none;
            gap: 0.75rem;
            padding-top: 0.1rem;
        }

        .skeleton.active {
            display: grid;
        }

        .skeleton-line {
            height: 14px;
            border-radius: 999px;
            background: linear-gradient(90deg, rgba(200, 191, 170, 0.22), rgba(200, 150, 42, 0.36), rgba(200, 191, 170, 0.22));
            background-size: 200% 100%;
            animation: shimmer 1.2s linear infinite;
        }

        .skeleton-line:nth-child(1) {
            width: 88%;
        }

        .skeleton-line:nth-child(2) {
            width: 63%;
        }

        .skeleton-line:nth-child(3) {
            width: 76%;
        }

        @keyframes shimmer {
            from {
                background-position: 200% 0;
            }

            to {
                background-position: -200% 0;
            }
        }

        .status {
            display: inline-flex;
            align-items: center;
            gap: 0.55rem;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #4b9f47;
            box-shadow: 0 0 0 3px rgba(75, 159, 71, 0.14);
        }

        .error-msg {
            display: none;
            margin-top: 0.9rem;
            color: var(--rust);
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.78rem;
            padding: 0.8rem 1rem;
            background: rgba(184, 74, 30, 0.06);
            border: 1px solid rgba(184, 74, 30, 0.18);
        }

        .error-msg.visible {
            display: block;
        }

        .hidden {
            display: none;
        }

        @media (max-width: 768px) {
            .panels {
                grid-template-columns: 1fr;
            }

            .panel + .panel {
                border-left: none;
                border-top: 1px solid var(--border);
            }
        }

        @media (max-width: 600px) {
            header {
                padding: 1.2rem 1rem;
                flex-direction: column;
                gap: 0.3rem;
            }

            .logo {
                font-size: 1.6rem;
            }

            .main {
                padding: 1.2rem 1rem 2rem;
            }
        }
    </style>
</head>

<body>
    <header>
        <div>
            <div class="logo">Über<span>setzer</span></div>
            <div class="subtitle">Deutsch · Russisch — Переводчик</div>
        </div>
    </header>

    <main class="main">
        <section class="workspace">
            <div class="top-bar">
                <div class="badge" id="sourceBadge">DE</div>
                <button class="swap-btn" id="swapBtn" title="Сменить направление" aria-label="Сменить направление">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M4 8h13"></path>
                        <path d="m13 4 4 4-4 4"></path>
                        <path d="M20 16H7"></path>
                        <path d="m11 12-4 4 4 4"></path>
                    </svg>
                </button>
                <div class="badge" id="targetBadge">RU</div>
            </div>

            <div class="panels">
                <section class="panel">
                    <div class="panel-head">
                        <div class="panel-title">оригинал</div>
                        <div class="panel-tools">
                            <button class="icon-btn" id="copySourceBtn" title="Копировать" aria-label="Копировать оригинал">
                                <svg viewBox="0 0 24 24" aria-hidden="true">
                                    <rect x="9" y="9" width="11" height="11" rx="2"></rect>
                                    <path d="M6 15H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v1"></path>
                                </svg>
                            </button>
                            <button class="icon-btn" id="voiceBtn" title="Голосовой ввод" aria-label="Голосовой ввод">
                                <svg viewBox="0 0 24 24" aria-hidden="true">
                                    <path d="M12 3a3 3 0 0 1 3 3v6a3 3 0 1 1-6 0V6a3 3 0 0 1 3-3z"></path>
                                    <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
                                    <path d="M12 19v3"></path>
                                    <path d="M8 22h8"></path>
                                </svg>
                            </button>
                        </div>
                    </div>
                    <div class="panel-scroll" id="sourceScroll">
                        <div class="editor" id="sourceEditor" contenteditable="true" spellcheck="false"
                            data-placeholder="Введите текст для перевода..."></div>
                    </div>
                </section>

                <section class="panel">
                    <div class="panel-head">
                        <div class="panel-title">перевод</div>
                        <div class="panel-tools" id="targetTools">
                            <button class="icon-btn hidden" id="copyTargetBtn" title="Копировать" aria-label="Копировать перевод">
                                <svg viewBox="0 0 24 24" aria-hidden="true">
                                    <rect x="9" y="9" width="11" height="11" rx="2"></rect>
                                    <path d="M6 15H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v1"></path>
                                </svg>
                            </button>
                            <button class="icon-btn hidden" id="speakBtn" title="Озвучить" aria-label="Озвучить перевод">
                                <svg viewBox="0 0 24 24" aria-hidden="true">
                                    <path d="M11 5 6 9H3v6h3l5 4V5z"></path>
                                    <path d="M15.5 8.5a5 5 0 0 1 0 7"></path>
                                    <path d="M18.5 5.5a9 9 0 0 1 0 13"></path>
                                </svg>
                            </button>
                        </div>
                    </div>
                    <div class="panel-scroll" id="targetScroll">
                        <div class="skeleton" id="skeleton">
                            <div class="skeleton-line"></div>
                            <div class="skeleton-line"></div>
                            <div class="skeleton-line"></div>
                        </div>
                        <div class="translation-output empty" id="translationOutput">Перевод появится здесь...</div>
                    </div>
                </section>
            </div>

            <div class="bottom-bar">
                <div id="charCount">0 символов</div>
                <div class="status">
                    <span class="status-dot"></span>
                    <span>синхронная прокрутка</span>
                </div>
            </div>
        </section>

        <div class="error-msg" id="errorMsg"></div>
    </main>

    <script>
        const sourceEditor = document.getElementById('sourceEditor');
        const translationOutput = document.getElementById('translationOutput');
        const sourceBadge = document.getElementById('sourceBadge');
        const targetBadge = document.getElementById('targetBadge');
        const swapBtn = document.getElementById('swapBtn');
        const copySourceBtn = document.getElementById('copySourceBtn');
        const copyTargetBtn = document.getElementById('copyTargetBtn');
        const speakBtn = document.getElementById('speakBtn');
        const voiceBtn = document.getElementById('voiceBtn');
        const sourceScroll = document.getElementById('sourceScroll');
        const targetScroll = document.getElementById('targetScroll');
        const skeleton = document.getElementById('skeleton');
        const charCount = document.getElementById('charCount');
        const errorMsg = document.getElementById('errorMsg');

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

        let direction = 'de-ru';
        let sourceText = '';
        let translatedText = '';
        let leftSentences = [];
        let rightSentences = [];
        let activeSentenceIndex = null;
        let debounceTimer = null;
        let recognition = null;
        let isRecording = false;
        let syncingScroll = false;
        let requestCounter = 0;

        function getSourceLang() {
            return direction === 'de-ru' ? 'de-DE' : 'ru-RU';
        }

        function getTargetLang() {
            return direction === 'de-ru' ? 'ru-RU' : 'de-DE';
        }

        function escapeHtml(text) {
            return text
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function splitIntoSentences(text) {
            const normalized = text.replace(/\r/g, '').trim();
            if (!normalized) return [];

            const chunks = normalized.match(/[^.!?\n]+(?:[.!?]+|$)|[^\n]+/g) || [];
            return chunks
                .map((chunk) => chunk.replace(/\s+/g, ' ').trim())
                .filter(Boolean);
        }

        function setCaretToEnd(element) {
            const range = document.createRange();
            const selection = window.getSelection();
            range.selectNodeContents(element);
            range.collapse(false);
            selection.removeAllRanges();
            selection.addRange(range);
        }

        function updateDirectionUI() {
            sourceBadge.textContent = direction === 'de-ru' ? 'DE' : 'RU';
            targetBadge.textContent = direction === 'de-ru' ? 'RU' : 'DE';
            renderSource();
            renderTranslation();
        }

        function updateCharCount() {
            charCount.textContent = `${sourceText.trim().length} символов`;
        }

        function showError(message) {
            errorMsg.textContent = message;
            errorMsg.classList.add('visible');
        }

        function clearError() {
            errorMsg.classList.remove('visible');
            errorMsg.textContent = '';
        }

        function flashButton(button) {
            button.style.background = 'var(--cream)';
            button.style.color = 'var(--ink)';
            setTimeout(() => {
                button.style.background = 'transparent';
                button.style.color = '';
            }, 900);
        }

        function setTranslationLoading(isLoading) {
            skeleton.classList.toggle('active', isLoading);
            translationOutput.classList.toggle('hidden', isLoading);
        }

        function updateTargetActions() {
            const hasTranslation = Boolean(translatedText.trim());
            copyTargetBtn.classList.toggle('hidden', !hasTranslation);
            speakBtn.classList.toggle('hidden', !hasTranslation);
        }

        function renderSource(preserveCaret = false) {
            leftSentences = splitIntoSentences(sourceText);

            if (!sourceText.trim()) {
                sourceEditor.innerHTML = '';
                sourceEditor.dataset.placeholder = 'Введите текст для перевода...';
                return;
            }

            const html = leftSentences.length
                ? leftSentences.map((sentence, index) => {
                    const active = index === activeSentenceIndex ? ' active' : '';
                    return `<span class="sentence left${active}" data-index="${index}">${escapeHtml(sentence)}</span>`;
                }).join(' ')
                : escapeHtml(sourceText);

            sourceEditor.innerHTML = html;

            if (preserveCaret && document.activeElement === sourceEditor) {
                setCaretToEnd(sourceEditor);
            }
        }

        function renderTranslation() {
            rightSentences = splitIntoSentences(translatedText);

            if (!translatedText.trim()) {
                translationOutput.className = 'translation-output empty';
                translationOutput.textContent = 'Перевод появится здесь...';
                updateTargetActions();
                return;
            }

            translationOutput.className = 'translation-output';
            translationOutput.innerHTML = rightSentences.map((sentence, index) => {
                const active = index === activeSentenceIndex ? ' active' : '';
                return `<span class="sentence right${active}" data-index="${index}">${escapeHtml(sentence)}</span>`;
            }).join(' ');

            updateTargetActions();
        }

        function setActiveSentence(index) {
            activeSentenceIndex = index;

            document.querySelectorAll('.sentence.left').forEach((node) => {
                node.classList.toggle('active', Number(node.dataset.index) === index);
            });

            document.querySelectorAll('.sentence.right').forEach((node) => {
                node.classList.toggle('active', Number(node.dataset.index) === index);
            });

            const leftNode = sourceEditor.querySelector(`.sentence.left[data-index="${index}"]`);
            const rightNode = translationOutput.querySelector(`.sentence.right[data-index="${index}"]`);
            if (leftNode) leftNode.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
            if (rightNode) rightNode.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
        }

        function clearTranslation() {
            translatedText = '';
            activeSentenceIndex = null;
            renderTranslation();
        }

        function handleSourceInput() {
            sourceText = sourceEditor.innerText.replace(/\u00a0/g, ' ');
            updateCharCount();
            clearError();
            activeSentenceIndex = null;

            clearTimeout(debounceTimer);
            if (!sourceText.trim()) {
                sourceText = '';
                sourceEditor.innerHTML = '';
                clearTranslation();
                return;
            }

            debounceTimer = setTimeout(() => {
                requestTranslation(sourceText.trim());
            }, 900);
        }

        async function requestTranslation(text) {
            const requestId = ++requestCounter;
            setTranslationLoading(true);
            clearError();

            try {
                const response = await fetch('/api/translate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        text,
                        direction
                    })
                });

                const data = await response.json();
                if (!response.ok) {
                    throw new Error(data.detail || data.error?.message || 'Не удалось выполнить перевод.');
                }

                if (requestId !== requestCounter) return;

                translatedText = data.result || '';
                activeSentenceIndex = null;
                renderSource();
                renderTranslation();
            } catch (error) {
                if (requestId !== requestCounter) return;
                translatedText = '';
                renderTranslation();
                showError('Ошибка: ' + (error.message || 'Не удалось выполнить перевод.'));
            } finally {
                if (requestId === requestCounter) {
                    setTranslationLoading(false);
                }
            }
        }

        function syncScroll(from, to) {
            if (syncingScroll) return;
            syncingScroll = true;

            const maxFrom = from.scrollHeight - from.clientHeight;
            const maxTo = to.scrollHeight - to.clientHeight;
            const ratio = maxFrom > 0 ? from.scrollTop / maxFrom : 0;
            to.scrollTop = maxTo > 0 ? ratio * maxTo : 0;

            requestAnimationFrame(() => {
                syncingScroll = false;
            });
        }

        function toggleVoiceInput() {
            if (!SpeechRecognition) {
                showError('Голосовой ввод не поддерживается в этом браузере.');
                return;
            }

            if (isRecording && recognition) {
                recognition.stop();
                return;
            }

            recognition = new SpeechRecognition();
            recognition.lang = getSourceLang();
            recognition.interimResults = true;
            recognition.maxAlternatives = 1;

            recognition.onstart = () => {
                isRecording = true;
                voiceBtn.classList.add('recording');
                clearError();
            };

            recognition.onresult = (event) => {
                const transcript = Array.from(event.results)
                    .map((result) => result[0].transcript)
                    .join('');
                sourceText = transcript.trim();
                renderSource(true);
                updateCharCount();
            };

            recognition.onerror = (event) => {
                if (event.error !== 'aborted') {
                    showError('Ошибка голосового ввода: ' + event.error);
                }
            };

            recognition.onend = () => {
                isRecording = false;
                voiceBtn.classList.remove('recording');
                recognition = null;
                handleSourceInput();
            };

            recognition.start();
        }

        function speakTranslation() {
            if (!translatedText.trim()) return;

            if (!window.speechSynthesis) {
                showError('Озвучивание не поддерживается в этом браузере.');
                return;
            }

            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(translatedText);
            utterance.lang = getTargetLang();
            window.speechSynthesis.speak(utterance);
        }

        sourceEditor.addEventListener('input', handleSourceInput);
        sourceEditor.addEventListener('paste', () => {
            requestAnimationFrame(handleSourceInput);
        });

        sourceEditor.addEventListener('click', (event) => {
            const sentence = event.target.closest('.sentence.left');
            if (!sentence) return;
            setActiveSentence(Number(sentence.dataset.index));
        });

        translationOutput.addEventListener('click', (event) => {
            const sentence = event.target.closest('.sentence.right');
            if (!sentence) return;
            setActiveSentence(Number(sentence.dataset.index));
        });

        sourceScroll.addEventListener('scroll', () => syncScroll(sourceScroll, targetScroll));
        targetScroll.addEventListener('scroll', () => syncScroll(targetScroll, sourceScroll));

        swapBtn.addEventListener('click', () => {
            direction = direction === 'de-ru' ? 'ru-de' : 'de-ru';
            updateDirectionUI();
            if (sourceText.trim()) {
                requestTranslation(sourceText);
            }
        });

        copySourceBtn.addEventListener('click', async () => {
            if (!sourceText.trim()) return;
            await navigator.clipboard.writeText(sourceText);
            flashButton(copySourceBtn);
        });

        copyTargetBtn.addEventListener('click', async () => {
            if (!translatedText.trim()) return;
            await navigator.clipboard.writeText(translatedText);
            flashButton(copyTargetBtn);
        });

        voiceBtn.addEventListener('click', toggleVoiceInput);
        speakBtn.addEventListener('click', speakTranslation);

        updateDirectionUI();
        updateCharCount();
        renderTranslation();
    </script>
</body>

</html>
