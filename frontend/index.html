<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Übersetzer · DE ↔ RU</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f8f9fa;
            --surface: #ffffff;
            --border: #e9ecef;
            --text: #212529;
            --muted: #6c757d;
            --accent: #2563eb;
            --accent-hover: #1d4ed8;
            --accent-light: #eff6ff;
            --danger: #dc2626;
            --sidebar-w: 60px;
            --header-h: 52px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            color: var(--text);
            background: var(--bg);
            height: 100vh;
            overflow: hidden;
        }

        /* ── App shell ───────────────────────────── */

        .app {
            display: flex;
            height: 100vh;
        }

        /* ── Sidebar ─────────────────────────────── */

        .sidebar {
            width: var(--sidebar-w);
            flex-shrink: 0;
            background: var(--surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 12px 0;
            gap: 4px;
            z-index: 10;
        }

        .sidebar-logo {
            width: 36px;
            height: 36px;
            background: var(--accent);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 16px;
            flex-shrink: 0;
        }

        .sidebar-logo svg {
            width: 20px;
            height: 20px;
            fill: white;
        }

        .nav-btn {
            width: 40px;
            height: 40px;
            border: none;
            background: transparent;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--muted);
            transition: background .15s, color .15s;
            position: relative;
        }

        .nav-btn:hover {
            background: var(--bg);
            color: var(--text);
        }

        .nav-btn.active {
            background: var(--accent-light);
            color: var(--accent);
        }

        .nav-btn svg {
            width: 20px;
            height: 20px;
            stroke: currentColor;
            fill: none;
            stroke-width: 1.8;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .nav-btn[title]:hover::after {
            content: attr(title);
            position: absolute;
            left: calc(100% + 10px);
            top: 50%;
            transform: translateY(-50%);
            background: #1e293b;
            color: #fff;
            font-size: 12px;
            padding: 4px 8px;
            border-radius: 4px;
            white-space: nowrap;
            pointer-events: none;
            z-index: 100;
        }

        .nav-spacer { flex: 1; }

        /* ── App body ────────────────────────────── */

        .app-body {
            flex: 1;
            min-width: 0;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ── Header ──────────────────────────────── */

        header {
            height: var(--header-h);
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 20px;
            gap: 16px;
            flex-shrink: 0;
        }

        .header-logo {
            font-size: 16px;
            font-weight: 600;
            color: var(--text);
            letter-spacing: -0.02em;
            margin-right: 8px;
        }

        .header-logo span { color: var(--accent); }

        .header-langs {
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 0 auto;
        }

        .lang-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: var(--surface);
            font-size: 14px;
            font-weight: 500;
            color: var(--text);
            cursor: pointer;
            transition: border-color .15s;
            font-family: 'Inter', sans-serif;
        }

        .lang-btn:hover { border-color: #adb5bd; }

        .lang-btn svg {
            width: 14px;
            height: 14px;
            stroke: var(--muted);
            fill: none;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .swap-btn {
            width: 32px;
            height: 32px;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: var(--surface);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--muted);
            transition: border-color .15s, color .15s;
        }

        .swap-btn:hover { border-color: #adb5bd; color: var(--text); }

        .swap-btn svg {
            width: 16px;
            height: 16px;
            stroke: currentColor;
            fill: none;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .hdr-btn {
            width: 32px;
            height: 32px;
            border: none;
            background: transparent;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--muted);
            transition: background .15s, color .15s;
        }

        .hdr-btn:hover { background: var(--bg); color: var(--text); }

        .hdr-btn svg {
            width: 18px;
            height: 18px;
            stroke: currentColor;
            fill: none;
            stroke-width: 1.8;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        /* ── Content ─────────────────────────────── */

        .content {
            flex: 1;
            overflow-y: auto;
            padding: 20px 24px 40px;
        }

        /* ── Translation panels ──────────────────── */

        .panels {
            display: grid;
            grid-template-columns: 1fr 1fr;
            border: 1px solid var(--border);
            border-radius: 10px;
            background: var(--surface);
            overflow: hidden;
        }

        .panel {
            display: flex;
            flex-direction: column;
            min-height: 180px;
        }

        .panel + .panel {
            border-left: 1px solid var(--border);
        }

        .panel-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px 8px;
        }

        .panel-lang {
            font-size: 13px;
            font-weight: 500;
            color: var(--muted);
        }

        .panel-clear {
            width: 24px;
            height: 24px;
            border: none;
            background: transparent;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--muted);
            transition: background .13s, color .13s;
        }

        .panel-clear:hover { background: var(--bg); color: var(--text); }

        .panel-clear svg {
            width: 14px;
            height: 14px;
            stroke: currentColor;
            fill: none;
            stroke-width: 2;
            stroke-linecap: round;
        }

        .panel-body {
            flex: 1;
            padding: 4px 16px 12px;
        }

        .editor {
            width: 100%;
            min-height: 100px;
            font-size: 22px;
            font-weight: 400;
            line-height: 1.4;
            color: var(--text);
            outline: none;
            font-family: 'Inter', sans-serif;
            word-break: break-word;
        }

        .editor:empty::before {
            content: attr(data-placeholder);
            color: #ced4da;
            font-weight: 300;
        }

        .translation-text {
            font-size: 22px;
            font-weight: 500;
            line-height: 1.4;
            color: var(--text);
            min-height: 100px;
        }

        .translation-text.empty {
            color: #ced4da;
            font-weight: 300;
            font-size: 18px;
        }

        .translation-note {
            margin-top: 6px;
            font-size: 13px;
            color: var(--muted);
            font-weight: 400;
        }

        .panel-bottom {
            display: flex;
            align-items: center;
            gap: 2px;
            padding: 8px 12px 12px;
            border-top: 1px solid var(--border);
        }

        .panel-char-count {
            font-size: 12px;
            color: var(--muted);
            margin-left: auto;
        }

        .icon-btn {
            width: 30px;
            height: 30px;
            border: none;
            background: transparent;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--muted);
            transition: background .13s, color .13s;
        }

        .icon-btn:hover { background: var(--bg); color: var(--text); }
        .icon-btn.active { color: var(--accent); }
        .icon-btn.fav-on { color: #f59e0b; }

        .icon-btn svg {
            width: 16px;
            height: 16px;
            stroke: currentColor;
            fill: none;
            stroke-width: 1.8;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .icon-btn.recording { color: var(--danger); }

        /* skeleton в панели перевода */
        .panel-skeleton {
            display: none;
            flex-direction: column;
            gap: 10px;
            padding: 4px 0;
        }

        .panel-skeleton.active { display: flex; }

        .skel-line {
            height: 14px;
            border-radius: 6px;
            background: linear-gradient(90deg, #f1f3f5, #e9ecef, #f1f3f5);
            background-size: 200% 100%;
            animation: skel 1.2s linear infinite;
        }

        .skel-line:nth-child(1) { width: 70%; height: 22px; border-radius: 4px; }
        .skel-line:nth-child(2) { width: 45%; }

        @keyframes skel {
            from { background-position: 200% 0; }
            to   { background-position: -200% 0; }
        }

        /* ── Translate button ────────────────────── */

        .translate-row {
            display: flex;
            justify-content: center;
            margin: 16px 0;
        }

        .translate-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 28px;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 500;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: background .15s;
        }

        .translate-btn:hover { background: var(--accent-hover); }

        .translate-btn svg {
            width: 16px;
            height: 16px;
            stroke: currentColor;
            fill: none;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        /* ── Error ───────────────────────────────── */

        .error-msg {
            display: none;
            padding: 10px 14px;
            background: #fef2f2;
            border: 1px solid #fecaca;
            border-radius: 8px;
            color: var(--danger);
            font-size: 13px;
            margin-bottom: 16px;
        }

        .error-msg.visible { display: block; }

        /* ── Analysis grid ───────────────────────── */

        .analysis {
            display: none;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 12px;
        }

        .analysis.visible { display: grid; }

        .block {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 16px;
        }

        .block-title {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--muted);
            margin-bottom: 12px;
        }

        /* Блок 1: тип + слово */
        .type-chip {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
            background: var(--accent-light);
            color: var(--accent);
            margin-bottom: 8px;
        }

        .block-word {
            font-size: 18px;
            font-weight: 500;
            color: var(--text);
        }

        /* Блок 2: перевод */
        .block-translation {
            font-size: 16px;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 6px;
        }

        .block-note {
            font-size: 13px;
            color: var(--muted);
            line-height: 1.5;
        }

        /* Блок 3: примеры */
        .example-item {
            padding: 10px 0;
            border-bottom: 1px solid var(--border);
            display: flex;
            gap: 8px;
            align-items: flex-start;
        }

        .example-item:last-child { border-bottom: none; padding-bottom: 0; }
        .example-item:first-child { padding-top: 0; }

        .example-num {
            font-size: 11px;
            color: var(--muted);
            font-weight: 600;
            margin-top: 2px;
            flex-shrink: 0;
            width: 14px;
        }

        .example-texts { flex: 1; }

        .example-de {
            font-size: 13px;
            color: var(--text);
            margin-bottom: 2px;
        }

        .example-ru {
            font-size: 13px;
            color: var(--muted);
        }

        .example-speak {
            flex-shrink: 0;
            width: 26px;
            height: 26px;
            border: none;
            background: transparent;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--muted);
            transition: background .12s, color .12s;
        }

        .example-speak:hover { background: var(--bg); color: var(--text); }

        .example-speak svg {
            width: 14px;
            height: 14px;
            stroke: currentColor;
            fill: none;
            stroke-width: 1.8;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        /* Блок 4: таблица форм */
        .forms-table {
            width: 100%;
            border-collapse: collapse;
        }

        .forms-table tr { border-bottom: 1px solid var(--border); }
        .forms-table tr:last-child { border-bottom: none; }

        .forms-table td {
            padding: 7px 0;
            font-size: 13px;
            vertical-align: top;
        }

        .forms-table td:first-child {
            color: var(--muted);
            width: 90px;
            flex-shrink: 0;
        }

        .forms-table td:last-child {
            color: var(--text);
            font-weight: 500;
        }

        /* Блок 5: синонимы */
        .chips {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .chip {
            padding: 4px 10px;
            border: 1px solid var(--border);
            border-radius: 20px;
            font-size: 12px;
            color: var(--text);
            background: var(--bg);
        }

        /* Блок 6: лингвистика */
        .linguistic-text {
            font-size: 13px;
            color: var(--text);
            line-height: 1.6;
        }

        /* Блок: существительное (род/мн.ч.) */
        .noun-row {
            display: flex;
            gap: 24px;
        }

        .noun-field-label {
            font-size: 11px;
            color: var(--muted);
            margin-bottom: 4px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        .noun-field-value {
            font-size: 15px;
            font-weight: 500;
            color: var(--text);
        }

        /* ── Responsive ──────────────────────────── */

        @media (max-width: 768px) {
            .panels { grid-template-columns: 1fr; }
            .panel + .panel { border-left: none; border-top: 1px solid var(--border); }
            .content { padding: 12px 12px 40px; }
            .analysis { grid-template-columns: 1fr; }
            .header-logo { display: none; }
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>
<div class="app">

    <!-- ── Sidebar ── -->
    <aside class="sidebar">
        <div class="sidebar-logo">
            <svg viewBox="0 0 24 24"><path d="M12.87 15.07l-2.54-2.51.03-.03A17.52 17.52 0 0 0 14.07 6H17V4h-7V2H8v2H1v2h11.17C11.5 7.92 10.44 9.75 9 11.35 8.07 10.32 7.3 9.19 6.69 8h-2c.73 1.63 1.73 3.17 2.98 4.56l-5.09 5.02L4 19l5-5 3.11 3.11.76-2.04zM18.5 10h-2L12 22h2l1.12-3h4.75L21 22h2l-4.5-12zm-2.62 7l1.62-4.33L19.12 17h-3.24z"/></svg>
        </div>

        <button class="nav-btn active" title="Переводчик" id="navTranslate">
            <svg viewBox="0 0 24 24"><path d="M3 5h12M9 3v2m1.048 9.5A18.022 18.022 0 0 1 6.412 9m6.088 9h7M11 21l5-10 5 10M12.751 5C11.783 10.77 8.07 15.61 3 18.129"></path></svg>
        </button>

        <button class="nav-btn" title="История" id="navHistory">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
        </button>

        <button class="nav-btn" title="Избранное" id="navFavorites">
            <svg viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>
        </button>

        <div class="nav-spacer"></div>

        <button class="nav-btn" title="Настройки">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
        </button>
    </aside>

    <!-- ── App body ── -->
    <div class="app-body">

        <!-- Header -->
        <header>
            <div class="header-logo">Über<span>setzer</span></div>

            <div class="header-langs">
                <button class="lang-btn" id="sourceLangBtn">
                    <span id="sourceLangLabel">Немецкий</span>
                    <svg viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"></polyline></svg>
                </button>

                <button class="swap-btn" id="swapBtn" title="Сменить направление">
                    <svg viewBox="0 0 24 24"><path d="M7 16V4m0 0L3 8m4-4l4 4M17 8v12m0 0l4-4m-4 4l-4-4"></path></svg>
                </button>

                <button class="lang-btn" id="targetLangBtn">
                    <span id="targetLangLabel">Русский</span>
                    <svg viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"></polyline></svg>
                </button>
            </div>

            <div class="header-actions">
                <button class="hdr-btn" title="Тёмная тема">
                    <svg viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
                </button>
                <button class="hdr-btn" title="Профиль">
                    <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                </button>
            </div>
        </header>

        <!-- Content -->
        <div class="content">

            <!-- Translation panels -->
            <div class="panels">
                <!-- Source -->
                <div class="panel">
                    <div class="panel-top">
                        <span class="panel-lang" id="sourcePanelLang">Немецкий</span>
                        <button class="panel-clear" id="clearBtn" title="Очистить">
                            <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                        </button>
                    </div>
                    <div class="panel-body">
                        <div class="editor" id="sourceEditor" contenteditable="true" spellcheck="false"
                            data-placeholder="Введите текст..."></div>
                    </div>
                    <div class="panel-bottom">
                        <button class="icon-btn" id="speakSourceBtn" title="Озвучить">
                            <svg viewBox="0 0 24 24"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path></svg>
                        </button>
                        <button class="icon-btn" id="voiceBtn" title="Голосовой ввод">
                            <svg viewBox="0 0 24 24"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" y1="19" x2="12" y2="23"></line><line x1="8" y1="23" x2="16" y2="23"></line></svg>
                        </button>
                        <button class="icon-btn" id="copySourceBtn" title="Копировать">
                            <svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                        </button>
                        <span class="panel-char-count" id="charCount">0 / 5000</span>
                    </div>
                </div>

                <!-- Target -->
                <div class="panel">
                    <div class="panel-top">
                        <span class="panel-lang" id="targetPanelLang">Русский</span>
                    </div>
                    <div class="panel-body">
                        <div class="panel-skeleton" id="panelSkeleton">
                            <div class="skel-line"></div>
                            <div class="skel-line"></div>
                        </div>
                        <div class="translation-text empty" id="translationText">Перевод появится здесь...</div>
                        <div class="translation-note hidden" id="translationNote"></div>
                    </div>
                    <div class="panel-bottom">
                        <button class="icon-btn" id="speakTargetBtn" title="Озвучить">
                            <svg viewBox="0 0 24 24"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path></svg>
                        </button>
                        <button class="icon-btn" id="copyTargetBtn" title="Копировать">
                            <svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                        </button>
                        <button class="icon-btn" id="favBtn" title="В избранное">
                            <svg viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>
                        </button>
                    </div>
                </div>
            </div>

            <!-- Translate button -->
            <div class="translate-row">
                <button class="translate-btn" id="translateBtn">
                    <svg viewBox="0 0 24 24"><path d="M5 3l14 9-14 9V3z"></path></svg>
                    Перевести
                </button>
            </div>

            <!-- Error -->
            <div class="error-msg" id="errorMsg"></div>

            <!-- Analysis -->
            <div class="analysis" id="analysis"></div>

        </div>
    </div>
</div>

<script>
    /* ── DOM refs ─────────────────────────────── */
    const sourceEditor    = document.getElementById('sourceEditor');
    const translationText = document.getElementById('translationText');
    const translationNote = document.getElementById('translationNote');
    const panelSkeleton   = document.getElementById('panelSkeleton');
    const charCount       = document.getElementById('charCount');
    const errorMsg        = document.getElementById('errorMsg');
    const analysis        = document.getElementById('analysis');
    const clearBtn        = document.getElementById('clearBtn');
    const swapBtn         = document.getElementById('swapBtn');
    const translateBtn    = document.getElementById('translateBtn');
    const speakSourceBtn  = document.getElementById('speakSourceBtn');
    const speakTargetBtn  = document.getElementById('speakTargetBtn');
    const voiceBtn        = document.getElementById('voiceBtn');
    const copySourceBtn   = document.getElementById('copySourceBtn');
    const copyTargetBtn   = document.getElementById('copyTargetBtn');
    const favBtn          = document.getElementById('favBtn');
    const sourceLangLabel = document.getElementById('sourceLangLabel');
    const targetLangLabel = document.getElementById('targetLangLabel');
    const sourcePanelLang = document.getElementById('sourcePanelLang');
    const targetPanelLang = document.getElementById('targetPanelLang');

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

    /* ── State ────────────────────────────────── */
    let direction       = 'de-ru';
    let sourceText      = '';
    let currentData     = null;
    let debounceTimer   = null;
    let requestCounter  = 0;
    let isRecording     = false;
    let recognition     = null;
    let currentHistoryId = null;

    const LANGS = {
        'de-ru': { source: 'Немецкий', target: 'Русский', sourceLang: 'de-DE', targetLang: 'ru-RU' },
        'ru-de': { source: 'Русский',  target: 'Немецкий', sourceLang: 'ru-RU', targetLang: 'de-DE' }
    };

    /* ── Storage ──────────────────────────────── */
    function storageGet(key) {
        try { return JSON.parse(localStorage.getItem(key)) || []; }
        catch { return []; }
    }

    function storageSet(key, val) {
        try { localStorage.setItem(key, JSON.stringify(val)); }
        catch {}
    }

    function saveToHistory(text, data, dir) {
        const list = storageGet('ub_history');
        const id = Date.now();
        list.unshift({ id, text, data, dir, ts: id });
        storageSet('ub_history', list.slice(0, 50));
        currentHistoryId = id;
        updateFavBtn();
    }

    function isSingleWord(text) {
        return text.trim().split(/\s+/).length === 1;
    }

    function saveToDict(text, data) {
        const list = storageGet('ub_dictionary');
        if (list.some(i => i.text.toLowerCase() === text.toLowerCase())) return;
        list.unshift({ id: Date.now(), text, data, ts: Date.now() });
        storageSet('ub_dictionary', list.slice(0, 200));
    }

    function isFavorited(id) {
        return storageGet('ub_favorites').some(i => i.id === id);
    }

    function toggleFavorite(id) {
        const item = storageGet('ub_history').find(i => i.id === id)
                  || storageGet('ub_favorites').find(i => i.id === id);
        if (!item) return;
        const favs = storageGet('ub_favorites');
        const idx  = favs.findIndex(i => i.id === id);
        if (idx === -1) favs.unshift({ ...item });
        else            favs.splice(idx, 1);
        storageSet('ub_favorites', favs.slice(0, 100));
        updateFavBtn();
    }

    /* ── UI helpers ───────────────────────────── */
    function escapeHtml(str) {
        if (!str) return '';
        return String(str)
            .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    }

    function updateLangLabels() {
        const l = LANGS[direction];
        sourceLangLabel.textContent = l.source;
        targetLangLabel.textContent = l.target;
        sourcePanelLang.textContent = l.source;
        targetPanelLang.textContent = l.target;
    }

    function updateCharCount() {
        charCount.textContent = `${sourceText.trim().length} / 5000`;
    }

    function showError(msg) {
        errorMsg.textContent = msg;
        errorMsg.classList.add('visible');
    }

    function clearError() {
        errorMsg.classList.remove('visible');
        errorMsg.textContent = '';
    }

    function setLoading(on) {
        panelSkeleton.classList.toggle('active', on);
        translationText.classList.toggle('hidden', on);
        translationNote.classList.toggle('hidden', true);
    }

    function updateFavBtn() {
        if (!currentHistoryId) return;
        favBtn.classList.toggle('fav-on', isFavorited(currentHistoryId));
    }

    function flashBtn(btn) {
        btn.style.color = 'var(--accent)';
        setTimeout(() => btn.style.color = '', 700);
    }

    function clearAll() {
        sourceText = '';
        sourceEditor.innerHTML = '';
        currentData = null;
        currentHistoryId = null;
        translationText.className = 'translation-text empty';
        translationText.textContent = 'Перевод появится здесь...';
        translationNote.classList.add('hidden');
        analysis.classList.remove('visible');
        analysis.innerHTML = '';
        clearError();
        updateCharCount();
        favBtn.classList.remove('fav-on');
    }

    /* ── Analysis render ──────────────────────── */

    function typeLabel(type) {
        const map = { verb: 'Глагол', noun: 'Существительное', adjective: 'Прилагательное', word: 'Слово', text: 'Текст' };
        return map[type] || type;
    }

    function renderTypeBlock(data) {
        return `<div class="block">
            <div class="block-title">Тип + слово</div>
            <div class="type-chip">${escapeHtml(typeLabel(data.type))}</div>
            <div class="block-word">${escapeHtml(data.source || '')}</div>
        </div>`;
    }

    function renderTranslationBlock(data) {
        return `<div class="block">
            <div class="block-title">Перевод</div>
            <div class="block-translation">${escapeHtml(data.translation)}</div>
            ${data.translation_note ? `<div class="block-note">${escapeHtml(data.translation_note)}</div>` : ''}
        </div>`;
    }

    function renderExamplesBlock(examples) {
        const items = examples.map((ex, i) => `
            <div class="example-item">
                <span class="example-num">${i + 1}.</span>
                <div class="example-texts">
                    <div class="example-de">${escapeHtml(ex.de)}</div>
                    <div class="example-ru">${escapeHtml(ex.ru)}</div>
                </div>
                <button class="example-speak" data-text="${escapeHtml(ex.de)}" title="Озвучить">
                    <svg viewBox="0 0 24 24"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path></svg>
                </button>
            </div>`).join('');
        return `<div class="block">
            <div class="block-title">Примеры (${examples.length})</div>
            ${items}
        </div>`;
    }

    function renderFormsBlock(forms) {
        const rows = Object.entries(forms).map(([k, v]) =>
            `<tr><td>${escapeHtml(k)}</td><td>${escapeHtml(v)}</td></tr>`).join('');
        return `<div class="block">
            <div class="block-title">Таблица форм</div>
            <table class="forms-table">${rows}</table>
        </div>`;
    }

    function renderSynonymsBlock(synonyms) {
        const chips = synonyms.map(s => `<span class="chip">${escapeHtml(s)}</span>`).join('');
        return `<div class="block">
            <div class="block-title">Синонимы</div>
            <div class="chips">${chips}</div>
        </div>`;
    }

    function renderLinguisticBlock(note) {
        return `<div class="block">
            <div class="block-title">Лингвистические детали</div>
            <div class="linguistic-text">${escapeHtml(note)}</div>
        </div>`;
    }

    function renderNounBlock(data) {
        return `<div class="block">
            <div class="block-title">Грамматика</div>
            <div class="noun-row">
                ${data.gender ? `<div><div class="noun-field-label">Род</div><div class="noun-field-value">${escapeHtml(data.gender)}</div></div>` : ''}
                ${data.plural ? `<div><div class="noun-field-label">Мн. число</div><div class="noun-field-value">${escapeHtml(data.plural)}</div></div>` : ''}
            </div>
        </div>`;
    }

    function renderAnalysis(data) {
        if (!data) { analysis.classList.remove('visible'); return; }

        const blocks = [];

        if (data.type && data.type !== 'text') blocks.push(renderTypeBlock(data));
        if (data.translation_note)             blocks.push(renderTranslationBlock(data));
        if (data.examples?.length)             blocks.push(renderExamplesBlock(data.examples));
        if (data.forms)                        blocks.push(renderFormsBlock(data.forms));
        if (data.synonyms?.length)             blocks.push(renderSynonymsBlock(data.synonyms));
        if (data.linguistic_note)              blocks.push(renderLinguisticBlock(data.linguistic_note));
        if (data.gender || data.plural)        blocks.push(renderNounBlock(data));

        if (blocks.length) {
            analysis.innerHTML = blocks.join('');
            analysis.classList.add('visible');
        } else {
            analysis.classList.remove('visible');
        }
    }

    /* ── Translation ──────────────────────────── */

    function showTranslation(data) {
        currentData = data;
        translationText.className = 'translation-text';
        translationText.textContent = data.translation || '';
        translationText.classList.remove('hidden');

        if (data.translation_note) {
            translationNote.textContent = data.translation_note;
            translationNote.classList.remove('hidden');
        } else {
            translationNote.classList.add('hidden');
        }

        renderAnalysis(data);
    }

    async function requestTranslation(text) {
        const reqId = ++requestCounter;
        setLoading(true);
        clearError();

        try {
            const res  = await fetch('/api/translate', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ text, direction })
            });

            const json = await res.json();
            if (!res.ok) throw new Error(json.detail || 'Ошибка перевода');
            if (reqId !== requestCounter) return;

            showTranslation(json.result);
            saveToHistory(text, json.result, direction);

            if (direction === 'de-ru' && isSingleWord(text)) {
                saveToDict(text, json.result);
            }
        } catch (err) {
            if (reqId !== requestCounter) return;
            translationText.className = 'translation-text empty';
            translationText.textContent = 'Перевод появится здесь...';
            analysis.classList.remove('visible');
            showError('Ошибка: ' + (err.message || 'Не удалось выполнить перевод.'));
        } finally {
            if (reqId === requestCounter) setLoading(false);
        }
    }

    function handleInput() {
        sourceText = sourceEditor.innerText.replace(/ /g, ' ');
        updateCharCount();
        clearError();

        clearTimeout(debounceTimer);
        if (!sourceText.trim()) { clearAll(); return; }

        debounceTimer = setTimeout(() => requestTranslation(sourceText.trim()), 900);
    }

    /* ── Speech ───────────────────────────────── */

    function speak(text, lang) {
        if (!window.speechSynthesis) { showError('Озвучивание не поддерживается.'); return; }
        window.speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance(text);
        u.lang = lang;
        window.speechSynthesis.speak(u);
    }

    function toggleVoice() {
        if (!SpeechRecognition) { showError('Голосовой ввод не поддерживается.'); return; }
        if (isRecording && recognition) { recognition.stop(); return; }

        recognition = new SpeechRecognition();
        recognition.lang = LANGS[direction].sourceLang;
        recognition.interimResults = true;

        recognition.onstart  = () => { isRecording = true; voiceBtn.classList.add('active'); };
        recognition.onresult = e  => {
            sourceText = Array.from(e.results).map(r => r[0].transcript).join('').trim();
            sourceEditor.innerText = sourceText;
            updateCharCount();
        };
        recognition.onerror  = e  => { if (e.error !== 'aborted') showError('Ошибка: ' + e.error); };
        recognition.onend    = () => {
            isRecording = false;
            voiceBtn.classList.remove('active');
            recognition = null;
            if (sourceText.trim()) requestTranslation(sourceText.trim());
        };
        recognition.start();
    }

    /* ── Events ───────────────────────────────── */

    sourceEditor.addEventListener('input', handleInput);
    sourceEditor.addEventListener('paste', () => requestAnimationFrame(handleInput));

    clearBtn.addEventListener('click', clearAll);

    translateBtn.addEventListener('click', () => {
        if (sourceText.trim()) requestTranslation(sourceText.trim());
    });

    swapBtn.addEventListener('click', () => {
        direction = direction === 'de-ru' ? 'ru-de' : 'de-ru';
        updateLangLabels();
        if (sourceText.trim()) requestTranslation(sourceText.trim());
    });

    copySourceBtn.addEventListener('click', async () => {
        if (!sourceText.trim()) return;
        await navigator.clipboard.writeText(sourceText);
        flashBtn(copySourceBtn);
    });

    copyTargetBtn.addEventListener('click', async () => {
        if (!currentData?.translation) return;
        await navigator.clipboard.writeText(currentData.translation);
        flashBtn(copyTargetBtn);
    });

    speakSourceBtn.addEventListener('click', () => {
        if (sourceText.trim()) speak(sourceText, LANGS[direction].sourceLang);
    });

    speakTargetBtn.addEventListener('click', () => {
        if (currentData?.translation) speak(currentData.translation, LANGS[direction].targetLang);
    });

    voiceBtn.addEventListener('click', toggleVoice);

    favBtn.addEventListener('click', () => {
        if (!currentHistoryId) return;
        toggleFavorite(currentHistoryId);
    });

    /* пример — кнопка озвучки */
    analysis.addEventListener('click', e => {
        const btn = e.target.closest('.example-speak');
        if (btn) speak(btn.dataset.text, LANGS[direction].sourceLang);
    });

    /* ── Init ─────────────────────────────────── */
    updateLangLabels();
    updateCharCount();
</script>
</body>
</html>
