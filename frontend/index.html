<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Übersetzer · DE ↔ RU</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=IBM+Plex+Mono:wght@300;400&family=IBM+Plex+Sans:wght@300;400;500&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --ink: #1a1208;
            --paper: #f5f0e8;
            --cream: #ede8dc;
            --rust: #b84a1e;
            --gold: #c8962a;
            --muted: #7a7060;
            --border: #c8bfaa;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--paper);
            color: var(--ink);
            font-family: 'IBM Plex Sans', sans-serif;
            font-weight: 300;
            min-height: 100vh;
            background-image:
                radial-gradient(ellipse at 10% 20%, rgba(200, 150, 42, 0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 90% 80%, rgba(184, 74, 30, 0.05) 0%, transparent 50%);
        }

        header {
            padding: 2rem 3rem 1.2rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: baseline;
            gap: 1.5rem;
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: -0.02em;
        }

        .logo span {
            color: var(--rust);
            font-style: italic;
        }

        .subtitle {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.68rem;
            color: var(--muted);
            letter-spacing: 0.14em;
            text-transform: uppercase;
        }

        .main {
            max-width: 860px;
            margin: 0 auto;
            padding: 2rem 2rem 4rem;
        }

        .direction-bar {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            margin-bottom: 1.4rem;
        }

        .dir-btn {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.72rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            padding: 0.42rem 1rem;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--muted);
            cursor: pointer;
            transition: all 0.18s;
            border-radius: 2px;
        }

        .dir-btn.active {
            background: var(--ink);
            color: var(--paper);
            border-color: var(--ink);
        }

        .dir-arrow {
            font-family: 'Playfair Display', serif;
            font-size: 1.1rem;
            color: var(--rust);
        }

        .dir-sep {
            color: var(--border);
            margin: 0 0.4rem;
        }

        textarea {
            width: 100%;
            min-height: 130px;
            padding: 1.2rem 1.4rem;
            font-family: 'IBM Plex Sans', sans-serif;
            font-size: 1rem;
            font-weight: 300;
            line-height: 1.65;
            color: var(--ink);
            background: var(--cream);
            border: 1px solid var(--border);
            border-radius: 3px;
            resize: vertical;
            outline: none;
            transition: border-color 0.2s;
            margin-bottom: 1rem;
        }

        textarea:focus {
            border-color: var(--gold);
        }

        textarea::placeholder {
            color: var(--muted);
        }

        .actions {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            margin-bottom: 1.5rem;
        }

        .translate-btn {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.8rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            padding: 0.7rem 2rem;
            background: var(--rust);
            color: var(--paper);
            border: none;
            border-radius: 2px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .translate-btn:hover {
            background: #9e3e16;
        }

        .translate-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .clear-btn {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.72rem;
            letter-spacing: 0.08em;
            color: var(--muted);
            background: transparent;
            border: 1px solid var(--border);
            padding: 0.65rem 1rem;
            border-radius: 2px;
            cursor: pointer;
            transition: all 0.18s;
            text-transform: uppercase;
        }

        .clear-btn:hover {
            color: var(--ink);
            border-color: var(--ink);
        }

        .shortcut-hint {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.65rem;
            color: var(--muted);
            margin-left: auto;
        }

        .spinner {
            display: none;
            align-items: center;
            gap: 0.6rem;
            color: var(--muted);
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.75rem;
            padding: 0.8rem 0;
        }

        .spinner.active {
            display: flex;
        }

        .dots span {
            display: inline-block;
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: var(--rust);
            animation: dot 1.2s infinite;
            margin: 0 1.5px;
        }

        .dots span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .dots span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes dot {

            0%,
            80%,
            100% {
                opacity: 0.2;
                transform: scale(0.8)
            }

            40% {
                opacity: 1;
                transform: scale(1)
            }
        }

        .error-msg {
            color: var(--rust);
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.8rem;
            padding: 0.8rem 1rem;
            background: rgba(184, 74, 30, 0.06);
            border: 1px solid rgba(184, 74, 30, 0.2);
            border-radius: 2px;
            margin-bottom: 1rem;
            display: none;
        }

        .error-msg.visible {
            display: block;
        }

        .result-box {
            background: white;
            border: 1px solid var(--border);
            border-left: 3px solid var(--rust);
            border-radius: 3px;
            padding: 1.6rem 1.6rem;
            position: relative;
            display: none;
            animation: fadeSlide 0.3s ease;
        }

        .result-box.visible {
            display: block;
        }

        @keyframes fadeSlide {
            from {
                opacity: 0;
                transform: translateY(8px)
            }

            to {
                opacity: 1;
                transform: translateY(0)
            }
        }

        .result-label {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: var(--muted);
            margin-bottom: 1rem;
        }

        .result-content {
            line-height: 1.75;
            font-size: 0.97rem;
        }

        .result-content h3 {
            font-family: 'Playfair Display', serif;
            font-size: 1.15rem;
            font-weight: 700;
            color: var(--rust);
            margin: 1.2rem 0 0.4rem;
        }

        .result-content h4 {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--gold);
            margin: 1rem 0 0.3rem;
        }

        .result-content strong {
            font-weight: 500;
        }

        .result-content em {
            font-style: italic;
            color: var(--rust);
        }

        .result-content table {
            border-collapse: collapse;
            width: 100%;
            margin: 0.8rem 0;
            font-size: 0.87rem;
        }

        .result-content th {
            background: var(--cream);
            padding: 0.4rem 0.8rem;
            text-align: left;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--muted);
            border: 1px solid var(--border);
        }

        .result-content td {
            padding: 0.4rem 0.8rem;
            border: 1px solid var(--border);
            vertical-align: top;
        }

        .result-content tr:nth-child(even) td {
            background: var(--paper);
        }

        .result-content ul,
        .result-content ol {
            padding-left: 1.5rem;
            margin: 0.3rem 0;
        }

        .result-content li {
            margin: 0.2rem 0;
        }

        .result-content hr {
            border: none;
            border-top: 1px solid var(--border);
            margin: 1.2rem 0;
        }

        .result-content p {
            margin-bottom: 0.5rem;
        }

        .copy-btn {
            position: absolute;
            top: 1rem;
            right: 1rem;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.62rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            padding: 0.3rem 0.7rem;
            background: transparent;
            border: 1px solid var(--border);
            color: var(--muted);
            cursor: pointer;
            border-radius: 2px;
            transition: all 0.15s;
        }

        .copy-btn:hover {
            color: var(--ink);
            border-color: var(--ink);
        }

        .history {
            margin-top: 2.5rem;
            border-top: 1px solid var(--border);
            padding-top: 1.5rem;
            display: none;
        }

        .history.visible {
            display: block;
        }

        .history-title {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: var(--muted);
            margin-bottom: 1rem;
        }

        .history-item {
            padding: 0.6rem 1rem;
            border: 1px solid var(--border);
            border-radius: 2px;
            margin-bottom: 0.45rem;
            cursor: pointer;
            transition: all 0.15s;
            font-size: 0.88rem;
            color: var(--muted);
            display: flex;
            align-items: center;
            gap: 0.8rem;
            background: transparent;
            width: 100%;
            text-align: left;
        }

        .history-item:hover {
            border-color: var(--gold);
            color: var(--ink);
            background: var(--cream);
        }

        .hist-tag {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--rust);
            opacity: 0.8;
            flex-shrink: 0;
        }

        @media(max-width:600px) {
            header {
                padding: 1.2rem 1rem;
                flex-direction: column;
                gap: 0.3rem
            }

            .logo {
                font-size: 1.6rem
            }

            .main {
                padding: 1.2rem 1rem 3rem
            }
        }
    </style>
</head>

<body>
    <header>
        <div>
            <div class="logo">Über<span>setzer</span></div>
            <div class="subtitle">Deutsch · Russisch — Переводчик</div>
        </div>
    </header>

    <div class="main">
        <div class="direction-bar">
            <button class="dir-btn active" id="btnDE_label" style="pointer-events:none">DE</button>
            <span class="dir-arrow" id="arrowLabel">→</span>
            <button class="dir-btn active" id="btnRU_label" style="pointer-events:none">RU</button>
            <span class="dir-sep">|</span>
            <button class="dir-btn" id="toggleDir">⇄ Сменить направление</button>
        </div>

        <textarea id="inputText" placeholder="Deutsches Wort oder Text…"></textarea>

        <div class="actions">
            <button class="translate-btn" id="translateBtn">Übersetzen</button>
            <button class="clear-btn" id="clearBtn">Очистить</button>
            <span class="shortcut-hint">Ctrl+Enter</span>
        </div>

        <div class="spinner" id="spinner">
            <div class="dots"><span></span><span></span><span></span></div>
            <span>Übersetze…</span>
        </div>

        <div class="error-msg" id="errorMsg"></div>

        <div class="result-box" id="resultBox">
            <button class="copy-btn" id="copyBtn">Копировать</button>
            <div class="result-label" id="resultLabel">DE → RU</div>
            <div class="result-content" id="resultContent"></div>
        </div>

        <div class="history" id="historySection">
            <div class="history-title">Verlauf · История</div>
            <div id="historyList"></div>
        </div>
    </div>

    <script>
        const SYSTEM_PROMPT = `As a Deutsch-Russischer Übersetzer, your main task is to translate text between German and Russian.

For single words:
- If it's a noun, first display the German word with definite article and plural form (e.g., "Die Meinung, Die Meinungen"). Correct any spelling errors in the input.
- Then provide the Russian translation.
- Write 3-4 examples of usage in German, followed by their Russian translation.
- Write synonyms in German.
- For words with multiple meanings depending on context, provide examples for each meaning.
- If it's a verb, indicate that it's a verb, write the German infinitive form. Correct any spelling errors.
- Provide Russian translation.
- Write 3-4 usage examples in German with Russian translations.
- Include a detailed table of verb conjugation covering past (Präteritum), present (Präsens), future (Futur I), perfect (Perfekt), imperative (Imperativ) with pronoun declension.
- Include German synonyms.
- Treat other parts of speech similarly.
- At the end, write in Russian: linguistic details about the word — in what context it is used and how frequently.

For short texts (less than 5 sentences or 400 characters):
- Write the Russian translation. Focus on explaining idiomatic expressions, phrases, and colloquialisms. Consider individual idioms and colloquial expressions as short texts.

For large texts (more than 5 sentences or 400+ characters):
- Provide an accurate translation and explain up to three key idiomatic expressions or phrases.

If the text is a question, first translate it as text (according to its size), then ask the user if they want it to be answered.

At the end of every response, add a section in Russian describing linguistic details and a brief explanation of individual words (frequency of use and what they mean).

If translating from Russian to German, apply the exact same scheme.

Format your response using markdown: use ### for main section headers, #### for subsections, **bold** for key terms, *italic* for examples or foreign words, and standard markdown tables for conjugation tables.`;

        let direction = 'de-ru';
        let history = [];
        try { history = JSON.parse(localStorage.getItem('ubersetzer_history') || '[]'); } catch (e) { }

        const inputText = document.getElementById('inputText');
        const translateBtn = document.getElementById('translateBtn');
        const clearBtn = document.getElementById('clearBtn');
        const toggleDir = document.getElementById('toggleDir');
        const spinner = document.getElementById('spinner');
        const resultBox = document.getElementById('resultBox');
        const resultContent = document.getElementById('resultContent');
        const resultLabel = document.getElementById('resultLabel');
        const copyBtn = document.getElementById('copyBtn');
        const errorMsg = document.getElementById('errorMsg');
        const historySection = document.getElementById('historySection');
        const historyList = document.getElementById('historyList');
        const btnDE = document.getElementById('btnDE_label');
        const btnRU = document.getElementById('btnRU_label');
        const arrowLabel = document.getElementById('arrowLabel');

        toggleDir.addEventListener('click', () => {
            direction = direction === 'de-ru' ? 'ru-de' : 'de-ru';
            updateDirectionUI();
        });

        function updateDirectionUI() {
            const isDeRu = direction === 'de-ru';
            btnDE.textContent = isDeRu ? 'DE' : 'RU';
            btnRU.textContent = isDeRu ? 'RU' : 'DE';
            btnDE.classList.toggle('active', isDeRu);
            btnRU.classList.toggle('active', !isDeRu);
            // Beide Schaltflächen als aktiv markieren
            btnDE.classList.add('active');
            btnRU.classList.add('active');
            inputText.placeholder = isDeRu ? 'Deutsches Wort oder Text…' : 'Русское слово или текст…';
        }

        translateBtn.addEventListener('click', translate);
        clearBtn.addEventListener('click', () => {
            inputText.value = '';
            resultBox.classList.remove('visible');
            errorMsg.classList.remove('visible');
            inputText.focus();
        });
        inputText.addEventListener('keydown', e => {
            if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') translate();
        });
        copyBtn.addEventListener('click', () => {
            navigator.clipboard.writeText(resultContent.innerText).then(() => {
                copyBtn.textContent = '✓ Скопировано';
                setTimeout(() => copyBtn.textContent = 'Копировать', 2000);
            });
        });

        function renderMarkdown(text) {
            // Zuerst Tabellen verarbeiten
            let result = text;

            // Markdown-Tabellen in HTML umwandeln
            result = result.replace(/(\|.+\|\n)+/g, (tableStr) => {
                const rows = tableStr.trim().split('\n');
                if (rows.length < 2) return tableStr;
                const headerCells = rows[0].split('|').filter((_, i, a) => i > 0 && i < a.length - 1).map(c => `<th>${c.trim()}</th>`).join('');
                const bodyRows = rows.slice(2).map(row => {
                    const cells = row.split('|').filter((_, i, a) => i > 0 && i < a.length - 1).map(c => `<td>${c.trim()}</td>`).join('');
                    return `<tr>${cells}</tr>`;
                }).join('');
                return `<table><thead><tr>${headerCells}</tr></thead><tbody>${bodyRows}</tbody></table>\n`;
            });

            result = result
                .replace(/^### (.+)$/gm, '<h3>$1</h3>')
                .replace(/^#### (.+)$/gm, '<h4>$1</h4>')
                .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
                .replace(/\*(.+?)\*/g, '<em>$1</em>')
                .replace(/^---+$/gm, '<hr>')
                .replace(/^[-•] (.+)$/gm, '<li>$1</li>')
                .replace(/(<li>.*<\/li>\n?)+/g, block => `<ul>${block}</ul>`);

            // Absätze erzeugen
            const parts = result.split(/\n\n+/);
            result = parts.map(part => {
                part = part.trim();
                if (!part) return '';
                if (/^<(h[1-6]|ul|ol|table|hr)/.test(part)) return part;
                return `<p>${part.replace(/\n/g, '<br>')}</p>`;
            }).join('\n');

            return result;
        }

        async function translate() {
            const text = inputText.value.trim();
            if (!text) return;

            errorMsg.classList.remove('visible');
            resultBox.classList.remove('visible');
            spinner.classList.add('active');
            translateBtn.disabled = true;

            const dirLabel = direction === 'de-ru' ? 'DE → RU' : 'RU → DE';
            const userMsg = direction === 'de-ru'
                ? `Переведи следующий текст с немецкого на русский:\n\n${text}`
                : `Переведи следующий текст с русского на немецкий:\n\n${text}`;

            try {
                const response = await fetch('/api/translate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        text: text,
                        direction: direction
                    })
                });

                const data = await response.json();
                if (data.error) throw new Error(data.error.message);

                const result = data.content?.[0]?.text || '';

                spinner.classList.remove('active');
                resultLabel.textContent = dirLabel;
                resultContent.innerHTML = renderMarkdown(result);
                resultBox.classList.add('visible');
                translateBtn.disabled = false;

                const entry = { text: text.slice(0, 60), direction: dirLabel, result, ts: Date.now() };
                history.unshift(entry);
                if (history.length > 20) history.pop();
                try { localStorage.setItem('ubersetzer_history', JSON.stringify(history)); } catch (e) { }
                renderHistory();

            } catch (err) {
                spinner.classList.remove('active');
                translateBtn.disabled = false;
                errorMsg.textContent = 'Ошибка: ' + (err.message || 'Не удалось выполнить перевод.');
                errorMsg.classList.add('visible');
            }
        }

        function renderHistory() {
            if (!history.length) { historySection.classList.remove('visible'); return; }
            historySection.classList.add('visible');
            historyList.innerHTML = history.slice(0, 8).map((item, i) => `
    <button class="history-item" data-index="${i}">
      <span class="hist-tag">${item.direction}</span>
      <span>${item.text}${item.text.length >= 60 ? '…' : ''}</span>
    </button>
  `).join('');

            historyList.querySelectorAll('.history-item').forEach(btn => {
                btn.addEventListener('click', () => {
                    const item = history[+btn.dataset.index];
                    inputText.value = item.text;
                    resultLabel.textContent = item.direction;
                    resultContent.innerHTML = renderMarkdown(item.result);
                    resultBox.classList.add('visible');
                });
            });
        }

        renderHistory();
    </script>
</body>

</html>
